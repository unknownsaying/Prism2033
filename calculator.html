<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>simple calculator · html</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
        }
        body {
            background: linear-gradient(145deg, #b0bec5 0%, #8e9eab 100%);
            min-height: 100vh;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .calculator {
            width: 340px;
            background: #2d3e4f;
            border-radius: 40px;
            padding: 25px 20px 30px 20px;
            box-shadow: 0 25px 40px rgba(0,0,0,0.5), 0 0 0 2px #1c2a36 inset, 0 8px 0 #0f1a24;
        }
        .display {
            background: #bcd4c0;
            border-radius: 18px;
            padding: 20px 18px;
            margin-bottom: 25px;
            text-align: right;
            font-size: 2.8rem;
            font-weight: 500;
            color: #1d2b36;
            box-shadow: inset 0 4px 8px #6d7e75, 0 4px 0 #6e8b7c;
            border: 2px solid #9fbaa8;
            overflow-x: auto;
            white-space: nowrap;
            font-variant-numeric: tabular-nums;
            letter-spacing: 1px;
        }
        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
        }
        button {
            border: none;
            background: #eef2f3;
            border-radius: 50px;
            padding: 18px 0;
            font-size: 1.8rem;
            font-weight: 600;
            color: #1e2b3a;
            box-shadow: 0 7px 0 #9aa9b5, 0 4px 12px rgba(0,0,0,0.3);
            cursor: pointer;
            transition: 0.05s linear;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid #f5f9ff;
        }
        button:active {
            transform: translateY(5px);
            box-shadow: 0 2px 0 #7b8a99, 0 2px 8px rgba(0,0,0,0.2);
        }
        .operator {
            background: #f9b83c;
            color: #1d2b32;
            box-shadow: 0 7px 0 #c57f1e;
            border-color: #ffe1a4;
        }
        .equals {
            background: #4c9f70;
            box-shadow: 0 7px 0 #2a7248;
            color: white;
            border-color: #a2e0b6;
        }
        .clear {
            background: #d65f5f;
            box-shadow: 0 7px 0 #973e3e;
            color: white;
            border-color: #f5b1b1;
        }
        .zero {
            grid-column: span 2;
        }
        .footer-note {
            text-align: center;
            margin-top: 18px;
            color: #bed9e8;
            font-weight: 400;
            text-shadow: 0 2px 2px #0b1a24;
            font-size: 0.9rem;
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>
<div class="calculator">
    <!-- display -->
    <div class="display" id="calcDisplay">0</div>

    <!-- button grid -->
    <div class="buttons">
        <button class="clear" onclick="clearAll()">AC</button>
        <button class="operator" onclick="appendOperator('/')">÷</button>
        <button class="operator" onclick="appendOperator('*')">×</button>
        <button class="operator" onclick="backspace()">⌫</button>

        <button onclick="appendNumber('7')">7</button>
        <button onclick="appendNumber('8')">8</button>
        <button onclick="appendNumber('9')">9</button>
        <button class="operator" onclick="appendOperator('-')">−</button>

        <button onclick="appendNumber('4')">4</button>
        <button onclick="appendNumber('5')">5</button>
        <button onclick="appendNumber('6')">6</button>
        <button class="operator" onclick="appendOperator('+')">+</button>

        <button onclick="appendNumber('1')">1</button>
        <button onclick="appendNumber('2')">2</button>
        <button onclick="appendNumber('3')">3</button>
        <button class="equals" onclick="calculate()">=</button>

        <button class="zero" onclick="appendNumber('0')">0</button>
        <button onclick="appendDecimal()">.</button>
        <button class="operator" onclick="negate()">±</button>
        <!-- extra blank for layout? actually grid fits 4 columns, zero spans 2, then two remain: . and ±, perfect -->
    </div>
    <div class="footer-note">
        simple · keyboard friendly (try it)
    </div>
</div>

<script>
    // get display element
    const display = document.getElementById('calcDisplay');
    let currentInput = '0';
    let previousInput = '';
    let operator = null;
    let resetNext = false;   // flag to clear display when next number starts

    // update display with formatted value (avoid scientific for small numbers)
    function updateDisplay(value) {
        // limit length to avoid overflow, but keep it friendly
        if (value.toString().length > 12) {
            display.innerText = Number(value).toExponential(6);
        } else {
            display.innerText = value;
        }
    }

    // handle number button
    function appendNumber(num) {
        if (resetNext) {
            currentInput = '';
            resetNext = false;
        }
        if (currentInput === '0' && num !== '.') {
            currentInput = num;
        } else {
            if (currentInput.length < 16) currentInput += num;  // prevent massive length
        }
        updateDisplay(currentInput);
    }

    // decimal point
    function appendDecimal() {
        if (resetNext) {
            currentInput = '0';
            resetNext = false;
        }
        if (!currentInput.includes('.')) {
            currentInput += '.';
        }
        updateDisplay(currentInput);
    }

    // operator button ( + - * / )
    function appendOperator(op) {
        // if there's already an operator pending, calculate first (except if we just typed operator)
        if (operator !== null && !resetNext) {
            calculate();
        }
        previousInput = currentInput;
        operator = op;
        resetNext = true;   // next number will start fresh
    }

    // clear all
    function clearAll() {
        currentInput = '0';
        previousInput = '';
        operator = null;
        resetNext = false;
        updateDisplay('0');
    }

    // backspace (⌫)
    function backspace() {
        if (currentInput.length > 1) {
            currentInput = currentInput.slice(0, -1);
        } else {
            currentInput = '0';
        }
        updateDisplay(currentInput);
    }

    // sign change (±)
    function negate() {
        if (currentInput !== '0') {
            if (currentInput.startsWith('-')) {
                currentInput = currentInput.slice(1);
            } else {
                currentInput = '-' + currentInput;
            }
        }
        updateDisplay(currentInput);
    }

    // perform calculation
    function calculate() {
        if (operator === null || resetNext) {
            // nothing to calculate, but if there's no operator just show current
            return;
        }

        const prev = parseFloat(previousInput);
        const curr = parseFloat(currentInput);
        if (isNaN(prev) || isNaN(curr)) {
            clearAll();
            return;
        }

        let result;
        switch (operator) {
            case '+': result = prev + curr; break;
            case '-': result = prev - curr; break;
            case '*': result = prev * curr; break;
            case '/': 
                if (curr === 0) {
                    alert("division by zero not allowed");
                    clearAll();
                    return;
                }
                result = prev / curr; 
                break;
            default: return;
        }

        // limit decimal places to avoid long trailing
        if (Number.isFinite(result)) {
            // round to avoid floating artifacts, but keep reasonable
            result = Math.round(result * 1e12) / 1e12;
        }

        currentInput = result.toString();
        operator = null;
        previousInput = '';
        resetNext = true;   // after =, next number clears
        updateDisplay(currentInput);
    }

    // optional: keyboard support
    document.addEventListener('keydown', (e) => {
        const key = e.key;
        if (key >= '0' && key <= '9') appendNumber(key);
        else if (key === '.') appendDecimal();
        else if (key === '+' || key === '-' || key === '*' || key === '/') {
            // map key to symbol used in calculator
            let op = key;
            if (key === '/') op = '/';
            if (key === '*') op = '*';
            appendOperator(op);
        }
        else if (key === 'Enter' || key === '=') {
            e.preventDefault();
            calculate();
        }
        else if (key === 'Backspace') backspace();
        else if (key === 'Escape') clearAll();
        else if (key === '_' || key === '±') negate(); // shift + - usually gives '_', but we also have button
    });
</script>
</body>
</html>
